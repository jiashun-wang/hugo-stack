media:
  - name: images
    label: Images
    input: static/images
    output: /images
    categories: [image]

  - name: media
    label: media
    input: static/media
    output: /media
    #categories: [image]
  
content:

  - name: post
    label: Post
    type: collection
    path: content/post
    view:
      fields: [pinned, draft, title, author, category, tags, published, date ]

    fields:
    - { name: title, label: Title, type: string, required: true }
    - { name: slug, label: Slug, type: string, required: true}
    - { name: description, label: Description, type: string }
    - { name: author, label: Author, type: string }
    - { name: pinned, label: Pinned, type: boolean }
    - { name: published, label: Published, type: date }
    - { name: date, label: Date, type: date }
    - { name: tags, label: Tags, type: string, list: true }
    - { name: category, label: Category, type: text }
    - { name: draft, label: Draft, type: boolean }
    - { name: cover, label: Cover Image, type: string }
    - { name: coverIncontent, label: Cover in Content, type: boolean }
    - { name: encrypted, label: Encrypted, type: boolean }
    - { name: password, label: Password, type: text}
    - { name: body, label: Body, type: rich-text}